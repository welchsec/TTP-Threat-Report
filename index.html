<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTP Threat Intelligence Report</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #040d14;
    --bg2: #071520;
    --panel: #0a1e2e;
    --border: #0e4a6e;
    --accent: #00d4ff;
    --accent2: #ff4d6d;
    --accent3: #39ff14;
    --text: #c8e6f5;
    --muted: #4a7a99;
    --warn: #ffbe0b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,255,0.015) 2px, rgba(0,212,255,0.015) 4px),
      repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,212,255,0.015) 2px, rgba(0,212,255,0.015) 4px);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
    margin-bottom: 2rem;
    position: relative;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .logo-icon {
    width: 42px;
    height: 42px;
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    color: var(--accent);
    font-size: 1.1rem;
    position: relative;
    clip-path: polygon(10% 0%, 90% 0%, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0% 90%, 0% 10%);
    background: rgba(0,212,255,0.05);
  }

  h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 0.2rem;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent3);
    border: 1px solid var(--accent3);
    padding: 0.3rem 0.75rem;
    letter-spacing: 0.1em;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent3);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* Controls */
  .controls {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 1.5rem;
    margin-bottom: 2rem;
    position: relative;
  }

  .controls::before {
    content: 'QUERY PARAMETERS';
    position: absolute;
    top: -0.5rem;
    left: 1rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    background: var(--panel);
    padding: 0 0.5rem;
    letter-spacing: 0.15em;
  }

  .controls-grid {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 1rem;
    align-items: end;
  }

  .api-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 1rem;
    align-items: end;
    margin-bottom: 1rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .api-note {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: 0.3rem;
    letter-spacing: 0.05em;
  }

  .api-note a {
    color: var(--accent);
    text-decoration: none;
  }

  .api-note a:hover { text-decoration: underline; }

  @media (max-width: 640px) {
    .controls-grid { grid-template-columns: 1fr; }
    .api-row { grid-template-columns: 1fr; }
  }

  .field label {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 0.4rem;
  }

  .field select, .field input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    padding: 0.6rem 0.75rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .field select:focus, .field input:focus {
    border-color: var(--accent);
  }

  .field select option { background: var(--bg2); }

  .generate-btn {
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    padding: 0.6rem 1.5rem;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    white-space: nowrap;
    position: relative;
    overflow: hidden;
  }

  .generate-btn:hover:not(:disabled) {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 20px rgba(0,212,255,0.4);
  }

  .generate-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Status bar */
  .status-bar {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    min-height: 1.2rem;
  }

  .status-bar.active { color: var(--accent); }
  .status-bar.done { color: var(--accent3); }
  .status-bar.error { color: var(--accent2); }

  .spinner {
    width: 10px;
    height: 10px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  .spinner.visible { display: block; }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Report output */
  #report {
    display: none;
  }

  #report.visible { display: block; }

  .report-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .report-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .report-meta {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-align: right;
    line-height: 1.6;
  }

  .export-btn {
    background: transparent;
    border: 1px solid var(--muted);
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    padding: 0.35rem 0.75rem;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.2s;
  }

  .export-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* TTP Cards */
  .ttp-grid {
    display: grid;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .ttp-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 1.25rem;
    position: relative;
    animation: slideIn 0.3s ease forwards;
    opacity: 0;
  }

  .ttp-card.critical { border-left-color: var(--accent2); }
  .ttp-card.high { border-left-color: var(--warn); }
  .ttp-card.medium { border-left-color: var(--accent); }
  .ttp-card.low { border-left-color: var(--accent3); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .ttp-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.75rem;
    gap: 1rem;
  }

  .ttp-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .ttp-id {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    white-space: nowrap;
  }

  .severity-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    padding: 0.2rem 0.5rem;
    border: 1px solid;
    white-space: nowrap;
  }

  .severity-badge.critical { color: var(--accent2); border-color: var(--accent2); background: rgba(255,77,109,0.08); }
  .severity-badge.high { color: var(--warn); border-color: var(--warn); background: rgba(255,190,11,0.08); }
  .severity-badge.medium { color: var(--accent); border-color: var(--accent); background: rgba(0,212,255,0.08); }
  .severity-badge.low { color: var(--accent3); border-color: var(--accent3); background: rgba(57,255,20,0.08); }

  .ttp-desc {
    font-size: 0.85rem;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 0.75rem;
  }

  .ttp-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
  }

  .tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 0.15rem 0.4rem;
    letter-spacing: 0.05em;
  }

  .tag.tactic { color: var(--warn); border-color: rgba(255,190,11,0.3); }
  .tag.platform { color: var(--accent3); border-color: rgba(57,255,20,0.3); }

  .mitigation {
    font-size: 0.78rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: 0.75rem;
    margin-top: 0.75rem;
    line-height: 1.5;
  }

  .mitigation strong {
    color: var(--accent3);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
  }

  /* Summary panel */
  .summary-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 1.25rem;
    margin-bottom: 1rem;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 1rem;
    position: relative;
  }

  .summary-panel::before {
    content: 'THREAT SUMMARY';
    position: absolute;
    top: -0.5rem;
    left: 1rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    background: var(--panel);
    padding: 0 0.5rem;
    letter-spacing: 0.15em;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'Rajdhani', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1;
  }

  .stat-num.critical { color: var(--accent2); }
  .stat-num.high { color: var(--warn); }
  .stat-num.medium { color: var(--accent); }
  .stat-num.low { color: var(--accent3); }
  .stat-num.total { color: #fff; }

  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 0.25rem;
  }

  /* Narrative section */
  .narrative-section {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 1.25rem;
    margin-bottom: 1.5rem;
    position: relative;
  }

  .narrative-section::before {
    content: 'ANALYST SUMMARY';
    position: absolute;
    top: -0.5rem;
    left: 1rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    background: var(--panel);
    padding: 0 0.5rem;
    letter-spacing: 0.15em;
  }

  .narrative-text {
    font-size: 0.85rem;
    line-height: 1.7;
    color: var(--text);
  }

  /* Placeholder */
  .placeholder {
    text-align: center;
    padding: 4rem 2rem;
    border: 1px dashed var(--border);
  }

  .placeholder-icon {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    opacity: 0.3;
  }

  .placeholder-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }

  /* Section label reusable */
  .section-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    letter-spacing: 0.15em;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.5rem;
    margin-bottom: 1rem;
  }

  /* Trending Campaigns */
  .campaigns-grid {
    display: grid;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .campaign-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--warn);
    padding: 1.25rem;
    animation: slideIn 0.3s ease forwards;
    opacity: 0;
  }

  .campaign-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.75rem;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .campaign-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--warn);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .campaign-trend {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--accent2);
    border: 1px solid var(--accent2);
    padding: 0.2rem 0.5rem;
    letter-spacing: 0.1em;
  }

  .campaign-desc {
    font-size: 0.85rem;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 0.75rem;
  }

  .lure-list {
    list-style: none;
    margin-bottom: 0.75rem;
  }

  .lure-list li {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: var(--text);
    padding: 0.25rem 0;
    border-bottom: 1px solid rgba(14,74,110,0.4);
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
    line-height: 1.5;
  }

  .lure-list li::before {
    content: '▸';
    color: var(--warn);
    flex-shrink: 0;
    margin-top: 0.05rem;
  }

  /* Attack Chain */
  .chains-grid {
    display: grid;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .chain-card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 1.25rem;
    animation: slideIn 0.3s ease forwards;
    opacity: 0;
  }

  .chain-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    letter-spacing: 0.03em;
  }

  .chain-desc {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 1rem;
    line-height: 1.5;
  }

  .chain-steps {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    align-items: stretch;
  }

  .chain-step {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 0.75rem;
    flex: 1;
    min-width: 130px;
    position: relative;
  }

  .chain-step-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 0.25rem;
  }

  .chain-step-phase {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.25rem;
    letter-spacing: 0.05em;
  }

  .chain-step-action {
    font-size: 0.75rem;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 0.4rem;
  }

  .chain-step-tool {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--accent2);
    background: rgba(255,77,109,0.08);
    border: 1px solid rgba(255,77,109,0.2);
    padding: 0.1rem 0.3rem;
    display: inline-block;
  }

  .chain-arrow {
    display: flex;
    align-items: center;
    padding: 0 0.25rem;
    color: var(--border);
    font-size: 1rem;
    align-self: center;
  }

  @media (max-width: 600px) {
    .chain-steps { flex-direction: column; }
    .chain-arrow { transform: rotate(90deg); align-self: flex-start; margin-left: 1rem; }
  }

  /* Process Watchlist */
  .processes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .process-card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 1rem;
    animation: slideIn 0.3s ease forwards;
    opacity: 0;
  }

  .process-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
    gap: 0.5rem;
  }

  .process-name {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    color: var(--accent2);
    letter-spacing: 0.05em;
  }

  .process-type {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    padding: 0.15rem 0.4rem;
    border: 1px solid;
    white-space: nowrap;
  }

  .process-type.rmm { color: var(--warn); border-color: rgba(255,190,11,0.4); }
  .process-type.malware { color: var(--accent2); border-color: rgba(255,77,109,0.4); }
  .process-type.lolbin { color: var(--accent); border-color: rgba(0,212,255,0.4); }
  .process-type.persistence { color: #b39ddb; border-color: rgba(179,157,219,0.4); }
  .process-type.exfil { color: var(--accent3); border-color: rgba(57,255,20,0.4); }

  .process-desc {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 0.5rem;
  }

  .process-path {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 0.25rem 0.5rem;
    word-break: break-all;
  }

  .ioc-section {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 1.25rem;
    margin-bottom: 1.5rem;
    position: relative;
  }

  .ioc-section::before {
    content: 'INDICATORS OF COMPROMISE (IOCs)';
    position: absolute;
    top: -0.5rem;
    left: 1rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    background: var(--panel);
    padding: 0 0.5rem;
    letter-spacing: 0.15em;
  }

  .ioc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 0.5rem;
  }

  .ioc-item {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.68rem;
    color: var(--text);
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 0.4rem 0.6rem;
    display: flex;
    gap: 0.5rem;
    align-items: flex-start;
    word-break: break-all;
    line-height: 1.4;
  }

  .ioc-type {
    color: var(--accent);
    flex-shrink: 0;
    font-size: 0.6rem;
    margin-top: 0.05rem;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-top">
      <div class="logo-area">
        <div class="logo-icon">⚠</div>
        <div>
          <h1>Threat <span>Intel</span> Report</h1>
          <div class="subtitle">MITRE ATT&CK // TTP MONITOR // POWERED BY AI</div>
        </div>
      </div>
      <div class="live-badge">
        <div class="live-dot"></div>
        LIVE INTELLIGENCE
      </div>
    </div>
  </header>

  <div class="controls">
    <div class="api-row">
      <div class="field">
        <label>AI PROVIDER</label>
        <select id="provider" onchange="updateProviderHint()">
          <option value="gemini">Google Gemini (FREE — Recommended)</option>
          <option value="groq">Groq (FREE — LLaMA 3.3 70B)</option>
          <option value="openrouter">OpenRouter (FREE models available)</option>
        </select>
      </div>
      <div class="field">
        <label>API KEY</label>
        <input type="password" id="apiKey" placeholder="Paste your API key here..." autocomplete="off" />
        <div class="api-note" id="apiNote">Get a free Gemini key (no credit card) at <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a> → Get API Key</div>
      </div>
    </div>
    <div class="controls-grid">
      <div class="field">
        <label>THREAT SECTOR / FOCUS</label>
        <select id="sector">
          <option value="general">All Sectors (General)</option>
          <option value="ransomware">Ransomware Groups</option>
          <option value="APT">APT / Nation-State Actors</option>
          <option value="financial">Financial / Banking</option>
          <option value="healthcare">Healthcare</option>
          <option value="critical infrastructure">Critical Infrastructure</option>
          <option value="web application">Web Application Attacks</option>
          <option value="supply chain">Supply Chain</option>
          <option value="phishing">Phishing / Social Engineering</option>
        </select>
      </div>
      <div class="field">
        <label>TIME PERIOD</label>
        <select id="period">
          <option value="this month">This Month</option>
          <option value="last 30 days">Last 30 Days</option>
          <option value="last quarter">Last Quarter</option>
          <option value="this year">This Year</option>
        </select>
      </div>
      <button class="generate-btn" id="generateBtn" onclick="generateReport()">
        ▶ GENERATE
      </button>
    </div>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="spinner" id="spinner"></div>
    <span id="statusText">AWAITING QUERY...</span>
  </div>

  <div id="placeholder" class="placeholder">
    <div class="placeholder-icon">🛡</div>
    <div class="placeholder-text">SELECT PARAMETERS AND GENERATE REPORT</div>
  </div>

  <div id="report"></div>

</div>

<script>
const today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

function setStatus(msg, type = '') {
  const bar = document.getElementById('statusBar');
  const spinner = document.getElementById('spinner');
  const text = document.getElementById('statusText');
  bar.className = 'status-bar ' + type;
  text.textContent = msg;
  spinner.className = 'spinner' + (type === 'active' ? ' visible' : '');
}

function updateProviderHint() {
  const provider = document.getElementById('provider').value;
  const note = document.getElementById('apiNote');
  const hints = {
    gemini: 'Get a free Gemini key (no credit card) at <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a> → Get API Key',
    groq: 'Get a free Groq key at <a href="https://console.groq.com" target="_blank">console.groq.com</a> → API Keys (no credit card needed)',
    openrouter: 'Get a free OpenRouter key at <a href="https://openrouter.ai" target="_blank">openrouter.ai</a> → Keys. Select free models only.'
  };
  note.innerHTML = hints[provider];
}

async function generateReport() {
  const sector = document.getElementById('sector').value;
  const period = document.getElementById('period').value;
  const apiKey = document.getElementById('apiKey').value.trim();
  const btn = document.getElementById('generateBtn');

  const provider = document.getElementById('provider').value;

  if (!apiKey) {
    setStatus('ERROR: PLEASE ENTER AN API KEY', 'error');
    return;
  }

  btn.disabled = true;
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('report').className = '';
  document.getElementById('report').innerHTML = '';
  setStatus('INITIALIZING THREAT INTELLIGENCE QUERY...', 'active');

  const prompt = `You are a senior cybersecurity threat intelligence analyst. Generate a detailed, realistic, and current threat intelligence report for the sector: "${sector}", covering: "${period}" as of March 2026.

Return ONLY a valid JSON object with this exact structure, no markdown, no preamble:

{
  "reportTitle": "string",
  "analystSummary": "string - 3-4 sentence executive summary",

  "trendingCampaigns": [
    {
      "name": "string - campaign name e.g. ClickFix, FakeCaptcha, etc.",
      "trend": "string - e.g. RISING, ACTIVE, NEW",
      "description": "string - 2-3 sentences on how this campaign works and why it is trending",
      "lures": ["array of 4-6 specific lure examples or delivery methods observed e.g. fake Chrome update popup, Discord CAPTCHA prompt, fake invoice PDF macro, etc."]
    }
  ],

  "attackChains": [
    {
      "title": "string - attack chain name e.g. Social Engineering to Ransomware Deployment",
      "description": "string - 1-2 sentence overview of who uses this chain and why",
      "steps": [
        {
          "phase": "string - phase name e.g. Initial Access, Execution, Persistence, Privilege Escalation, Lateral Movement, Exfiltration",
          "action": "string - specific action taken by attacker e.g. victim clicks fake CAPTCHA, runs PowerShell command",
          "tool": "string - specific tool, binary or malware used e.g. AnyDesk, mshta.exe, Cobalt Strike, mimikatz"
        }
      ]
    }
  ],

  "processWatchlist": [
    {
      "process": "string - exact process or filename e.g. AnyDesk.exe, mshta.exe, powershell.exe",
      "type": "rmm|malware|lolbin|persistence|exfil",
      "description": "string - why this process is suspicious and what attackers use it for",
      "path": "string - typical path or registry key to look for e.g. C:\\Users\\Public\\AnyDesk.exe or HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Run"
    }
  ],

  "iocs": [
    {
      "type": "string - e.g. DOMAIN, IP, FILE HASH, REGISTRY KEY, URL PATTERN",
      "value": "string - realistic but fictional IOC example"
    }
  ],

  "ttps": [
    {
      "id": "string - MITRE ATT&CK ID e.g. T1566",
      "name": "string - TTP name",
      "tactic": "string - MITRE tactic category",
      "severity": "critical|high|medium|low",
      "platforms": ["array of platforms"],
      "description": "string - 2-3 sentences on recent observations",
      "threatActors": ["array of threat actors"],
      "mitigation": "string - 1-2 sentence mitigation"
    }
  ]
}

Include: 2-3 trendingCampaigns, 2 attackChains with 5-7 steps each, 8-10 processWatchlist entries, 6-8 iocs, 6-8 ttps. Make everything specific and realistic for early 2026. For trendingCampaigns always include ClickFix or similar social engineering lure campaigns if relevant to the sector.`;


  try {
    setStatus('QUERYING THREAT INTELLIGENCE DATABASE...', 'active');

    let rawText = '';

    if (provider === 'gemini') {
      // Google Gemini API
      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { maxOutputTokens: 6000, temperature: 0.7 }
          })
        }
      );
      const data = await response.json();
      if (data.error) throw new Error(data.error.message);
      rawText = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

    } else if (provider === 'groq') {
      // Groq API
      const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          max_tokens: 6000,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error.message);
      rawText = data.choices?.[0]?.message?.content || '';

    } else if (provider === 'openrouter') {
      // OpenRouter API (free models)
      const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`,
          'HTTP-Referer': window.location.href
        },
        body: JSON.stringify({
          model: 'meta-llama/llama-3.3-70b-instruct:free',
          max_tokens: 6000,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error.message);
      rawText = data.choices?.[0]?.message?.content || '';
    }

    setStatus('PROCESSING INTELLIGENCE DATA...', 'active');

    // Parse JSON - strip any markdown fences
    const clean = rawText.replace(/```json|```/g, '').trim();
    const start = clean.indexOf('{');
    const end = clean.lastIndexOf('}');
    const jsonStr = clean.substring(start, end + 1);
    const report = JSON.parse(jsonStr);

    renderReport(report, sector, period);
    setStatus('REPORT GENERATED SUCCESSFULLY — ' + today, 'done');

  } catch (err) {
    console.error('Full error:', err);
    const msg = err?.message || String(err);
    setStatus('ERROR: ' + msg, 'error');
    document.getElementById('placeholder').innerHTML = `
      <div class="placeholder-icon">⚠</div>
      <div class="placeholder-text" style="color:var(--accent2);margin-bottom:0.5rem">ERROR DETAILS:</div>
      <div class="placeholder-text" style="color:var(--text);font-size:0.75rem;max-width:600px;margin:0 auto;line-height:1.6;word-break:break-word">${msg}</div>
    `;
    document.getElementById('placeholder').style.display = 'block';
  }

  btn.disabled = false;
}

function renderReport(data, sector, period) {
  const counts = { critical: 0, high: 0, medium: 0, low: 0 };
  data.ttps.forEach(t => { if (counts[t.severity] !== undefined) counts[t.severity]++; });

  // Trending Campaigns
  const campaignsHTML = (data.trendingCampaigns || []).map((c, i) => `
    <div class="campaign-card" style="animation-delay:${i * 0.08}s">
      <div class="campaign-header">
        <div class="campaign-name">⚡ ${c.name}</div>
        <div class="campaign-trend">▲ ${c.trend}</div>
      </div>
      <div class="campaign-desc">${c.description}</div>
      <ul class="lure-list">
        ${(c.lures || []).map(l => `<li>${l}</li>`).join('')}
      </ul>
    </div>
  `).join('');

  // Attack Chains
  const chainsHTML = (data.attackChains || []).map((chain, i) => {
    const stepsHTML = (chain.steps || []).map((step, si) => `
      ${si > 0 ? '<div class="chain-arrow">→</div>' : ''}
      <div class="chain-step">
        <div class="chain-step-num">STEP ${si + 1}</div>
        <div class="chain-step-phase">${step.phase}</div>
        <div class="chain-step-action">${step.action}</div>
        ${step.tool ? `<span class="chain-step-tool">${step.tool}</span>` : ''}
      </div>
    `).join('');
    return `
      <div class="chain-card" style="animation-delay:${i * 0.1}s">
        <div class="chain-title">${chain.title}</div>
        <div class="chain-desc">${chain.description}</div>
        <div class="chain-steps">${stepsHTML}</div>
      </div>
    `;
  }).join('');

  // Process Watchlist
  const processesHTML = (data.processWatchlist || []).map((p, i) => `
    <div class="process-card" style="animation-delay:${i * 0.05}s">
      <div class="process-header">
        <div class="process-name">${p.process}</div>
        <div class="process-type ${p.type}">${p.type.toUpperCase()}</div>
      </div>
      <div class="process-desc">${p.description}</div>
      ${p.path ? `<div class="process-path">${p.path}</div>` : ''}
    </div>
  `).join('');

  // IOCs
  const iocsHTML = (data.iocs || []).map(ioc => `
    <div class="ioc-item">
      <span class="ioc-type">[${ioc.type}]</span>
      <span>${ioc.value}</span>
    </div>
  `).join('');

  // TTP Cards
  const cardsHTML = (data.ttps || []).map((ttp, i) => `
    <div class="ttp-card ${ttp.severity}" style="animation-delay:${i * 0.08}s">
      <div class="ttp-card-header">
        <div>
          <div class="ttp-id">${ttp.id}</div>
          <div class="ttp-name">${ttp.name}</div>
        </div>
        <div class="severity-badge ${ttp.severity}">${ttp.severity.toUpperCase()}</div>
      </div>
      <div class="ttp-meta">
        <span class="tag tactic">⚡ ${ttp.tactic}</span>
        ${(ttp.platforms || []).map(p => `<span class="tag platform">${p}</span>`).join('')}
        ${(ttp.threatActors || []).slice(0,3).map(a => `<span class="tag">${a}</span>`).join('')}
      </div>
      <div class="ttp-desc">${ttp.description}</div>
      <div class="mitigation"><strong>MITIGATION // </strong>${ttp.mitigation}</div>
    </div>
  `).join('');

  const html = `
    <div class="report-header">
      <div class="report-title">${data.reportTitle}</div>
      <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;">
        <div class="report-meta">GENERATED: ${today}<br>PERIOD: ${period.toUpperCase()} // SECTOR: ${sector.toUpperCase()}</div>
        <button class="export-btn" onclick="exportReport()">⬇ EXPORT</button>
      </div>
    </div>

    <div class="summary-panel">
      <div class="stat"><div class="stat-num total">${data.ttps.length}</div><div class="stat-label">TOTAL TTPs</div></div>
      <div class="stat"><div class="stat-num critical">${counts.critical}</div><div class="stat-label">CRITICAL</div></div>
      <div class="stat"><div class="stat-num high">${counts.high}</div><div class="stat-label">HIGH</div></div>
      <div class="stat"><div class="stat-num medium">${counts.medium}</div><div class="stat-label">MEDIUM</div></div>
      <div class="stat"><div class="stat-num low">${counts.low}</div><div class="stat-label">LOW</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--warn)">${(data.trendingCampaigns||[]).length}</div><div class="stat-label">CAMPAIGNS</div></div>
      <div class="stat"><div class="stat-num" style="color:#b39ddb">${(data.processWatchlist||[]).length}</div><div class="stat-label">PROCESSES</div></div>
    </div>

    <div class="narrative-section">
      <div class="narrative-text">${data.analystSummary}</div>
    </div>

    ${campaignsHTML ? `
    <div style="margin-bottom:1.5rem">
      <div class="section-label">▲ TRENDING CAMPAIGNS &amp; LURES — OBSERVED THIS PERIOD</div>
      <div class="campaigns-grid">${campaignsHTML}</div>
    </div>` : ''}

    ${chainsHTML ? `
    <div style="margin-bottom:1.5rem">
      <div class="section-label">⛓ ATTACK CHAINS — HOW THREAT ACTORS OPERATE</div>
      <div class="chains-grid">${chainsHTML}</div>
    </div>` : ''}

    ${processesHTML ? `
    <div style="margin-bottom:1.5rem">
      <div class="section-label">⚙ PROCESS WATCHLIST — SUSPICIOUS EXECUTABLES &amp; TOOLS</div>
      <div class="processes-grid">${processesHTML}</div>
    </div>` : ''}

    ${iocsHTML ? `
    <div class="ioc-section">
      <div class="ioc-grid">${iocsHTML}</div>
    </div>` : ''}

    <div style="margin-bottom:1.5rem">
      <div class="section-label">🛡 MITRE ATT&amp;CK TTPs</div>
      <div class="ttp-grid">${cardsHTML}</div>
    </div>
  `;

  const reportEl = document.getElementById('report');
  reportEl.innerHTML = html;
  reportEl.className = 'visible';
  window._lastReport = data;
}

function exportReport() {
  if (!window._lastReport) return;
  const d = window._lastReport;
  let text = `THREAT INTELLIGENCE REPORT\nGenerated: ${today}\n${'='.repeat(60)}\n\n`;
  text += `${d.reportTitle}\n\nANALYST SUMMARY\n${'-'.repeat(40)}\n${d.analystSummary}\n\n`;

  if (d.trendingCampaigns?.length) {
    text += `TRENDING CAMPAIGNS\n${'='.repeat(60)}\n\n`;
    d.trendingCampaigns.forEach((c, i) => {
      text += `${i+1}. ${c.name} [${c.trend}]\n${c.description}\n`;
      text += `   Lures:\n${c.lures.map(l => `   - ${l}`).join('\n')}\n\n`;
    });
  }

  if (d.attackChains?.length) {
    text += `ATTACK CHAINS\n${'='.repeat(60)}\n\n`;
    d.attackChains.forEach((chain, i) => {
      text += `${i+1}. ${chain.title}\n${chain.description}\n`;
      chain.steps.forEach((s, si) => {
        text += `   Step ${si+1} [${s.phase}]: ${s.action} — Tool: ${s.tool}\n`;
      });
      text += '\n';
    });
  }

  if (d.processWatchlist?.length) {
    text += `PROCESS WATCHLIST\n${'='.repeat(60)}\n\n`;
    d.processWatchlist.forEach(p => {
      text += `${p.process} [${p.type.toUpperCase()}]\n   ${p.description}\n   Path: ${p.path}\n\n`;
    });
  }

  if (d.iocs?.length) {
    text += `INDICATORS OF COMPROMISE\n${'='.repeat(60)}\n\n`;
    d.iocs.forEach(ioc => { text += `[${ioc.type}] ${ioc.value}\n`; });
    text += '\n';
  }

  text += `TTPs OBSERVED\n${'='.repeat(60)}\n\n`;
  d.ttps.forEach((t, i) => {
    text += `${i+1}. [${t.id}] ${t.name}\n`;
    text += `   Severity: ${t.severity.toUpperCase()} | Tactic: ${t.tactic}\n`;
    text += `   Platforms: ${t.platforms.join(', ')}\n`;
    text += `   Threat Actors: ${t.threatActors.join(', ')}\n`;
    text += `   ${t.description}\n`;
    text += `   MITIGATION: ${t.mitigation}\n\n`;
  });

  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `TTP_Report_${today.replace(/,?\s/g,'_')}.txt`;
  a.click();
}
</script>
</body>
</html>
